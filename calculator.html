<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Web Simples</title>
    <meta
      name="description"
      content="Uma calculadora web simples com operações básicas feita com HTML, CSS e JavaScript."
    />
    <link rel="stylesheet" href="calculator/style.css" />
  </head>
  <body>
    <main class="app">
      <section class="calculator-wrapper">
        <div class="calculator-header">
          <p class="eyebrow">Projeto Free Codex</p>
          <h1>Calculadora web simples</h1>
          <p class="description">
            Faça contas rápidas com uma interface limpa e responsiva.
          </p>
        </div>

        <div class="calculator">
          <div class="screen">
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand" id="current-operand">0</div>
          </div>

          <div class="buttons">
            <button class="span-two action" data-action="clear">AC</button>
            <button class="action" data-action="delete">DEL</button>
            <button class="operator" data-operator="/">÷</button>

            <button data-number="7">7</button>
            <button data-number="8">8</button>
            <button data-number="9">9</button>
            <button class="operator" data-operator="*">×</button>

            <button data-number="4">4</button>
            <button data-number="5">5</button>
            <button data-number="6">6</button>
            <button class="operator" data-operator="-">−</button>

            <button data-number="1">1</button>
            <button data-number="2">2</button>
            <button data-number="3">3</button>
            <button class="operator" data-operator="+">+</button>

            <button data-number="0">0</button>
            <button data-number=".">.</button>
            <button class="span-two equals" data-action="calculate">=</button>
          </div>
        </div>
      </section>
    </main>

    <script src="calculator/script.js"></script>
  </body>
</html>
